{% extends 'participant/base.html' %}

{% block title %}Set New Password — EventAxis{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center py-12 px-4 bg-surface">
    <div class="max-w-md w-full">
        <div class="ea-card p-8 shadow-lg">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="bi bi-key text-primary text-2xl"></i>
                </div>
                <h2 class="text-2xl font-heading font-bold text-gray-900">Set New Password</h2>
                <p class="text-gray-500 text-sm mt-1">Choose a strong password for your account</p>
            </div>

            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div class="ea-form-group mb-0">
                    <label for="id_new_password1" class="ea-form-label">New Password</label>
                    <input type="password" name="new_password1" id="id_new_password1" required
                           class="ea-input" placeholder="At least 8 characters">
                </div>
                <div class="ea-form-group mb-0">
                    <label for="id_new_password2" class="ea-form-label">Confirm Password</label>
                    <input type="password" name="new_password2" id="id_new_password2" required
                           class="ea-input" placeholder="Re-enter your password">
                </div>
                <button type="submit" class="ea-btn ea-btn-primary ea-btn-lg w-full">
                    <i class="bi bi-check-lg mr-2"></i> Reset Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
