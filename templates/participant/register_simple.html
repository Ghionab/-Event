<!DOCTYPE html>
<html>

<head>
    <title>Register for Event</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen py-12">
    <div class="max-w-xl mx-auto px-4">
        <a href="/events/{{ event_id }}/" class="text-indigo-600 hover:text-indigo-800 mb-6 inline-block">
            &larr; Back to Event
        </a>

        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h1 class="text-2xl font-bold mb-6">Register for Event</h1>

            <!-- Registration Form with JavaScript handling -->
            <form id="registrationForm" onsubmit="return handleSubmit(event)">
                {% csrf_token %}
                <input type="hidden" name="event_id" value="{{ event_id }}">

                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Full Name *</label>
                    <input type="text" name="full_name" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Email *</label>
                    <input type="email" name="email" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Phone</label>
                    <input type="tel" name="phone" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Special Requests</label>
                    <textarea name="special_requests" rows="3"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg"></textarea>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-indigo-600 text-white py-4 rounded-lg font-bold hover:bg-indigo-700">
                    Complete Registration
                </button>
            </form>

            <script>
                function handleSubmit(event) {
                    event.preventDefault();
                    
                    const form = document.getElementById('registrationForm');
                    const submitBtn = document.getElementById('submitBtn');
                    const formData = new FormData(form);
                    
                    // Disable button
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Processing...';
                    
                    // Convert FormData to object
                    const data = {};
                    formData.forEach((value, key) => {
                        if (key !== 'csrfmiddlewaretoken') {
                            data[key] = value;
                        }
                    });
                    
                    // Submit via fetch
                    fetch('/api/v1/register/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': formData.get('csrfmiddlewaretoken')
                        },
                        body: JSON.stringify(data)
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.id && data.registration_number) {
                            // Success - redirect to success page
                            const successUrl = data.success_url || `/registration/success/${data.id}/`;
                            window.location.href = successUrl;
                        } else {
                            alert('Registration failed: ' + (data.message || 'Unknown error'));
                            submitBtn.disabled = false;
                            submitBtn.textContent = 'Complete Registration';
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('Registration failed. Please try again.');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Complete Registration';
                    });
                    
                    return false;
                }
            </script>
        </div>
    </div>
</body>

</html>
