{% extends 'participant/base.html' %}

{% block title %}Reset Link Sent — EventAxis{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center py-12 px-4 bg-surface">
    <div class="max-w-md w-full">
        <div class="ea-card p-8 text-center shadow-lg">
            <div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-5">
                <i class="bi bi-envelope-check text-primary text-2xl"></i>
            </div>
            <h2 class="text-2xl font-heading font-bold text-gray-900 mb-2">Check Your Email</h2>
            <p class="text-gray-500 text-sm mb-6">We've sent you an email with instructions to reset your password. Check your inbox and follow the link.</p>
            <a href="/login/" class="ea-btn ea-btn-primary ea-btn-lg">
                <i class="bi bi-arrow-left mr-2"></i> Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
