<!DOCTYPE html>
<html>
<head>
    <title>QR Code - {{ registration.attendee_name }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
        }
        .card {
            border: 3px solid #000;
            padding: 30px;
            display: inline-block;
            max-width: 400px;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .email {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        .qr-code {
            margin: 20px 0;
        }
        .qr-code img {
            width: 200px;
            height: 200px;
        }
        .code {
            font-family: monospace;
            font-size: 18px;
            background: #f5f5f5;
            padding: 10px 20px;
            display: inline-block;
        }
        .event {
            margin-top: 20px;
            font-size: 16px;
            color: #333;
        }
        .registration-number {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }
        @media print {
            body { padding: 0; }
            .card { border-width: 2px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="name">{{ registration.attendee_name }}</div>
        <div class="email">{{ registration.attendee_email }}</div>

        <div class="qr-code">
            <img src="data:image/png;base64,{{ qr_image }}" alt="QR Code">
        </div>

        <div class="code">{{ registration.qr_code }}</div>

        <div class="event">
            {{ registration.event.title }}
        </div>

        <div class="registration-number">
            {{ registration.registration_number }}
        </div>
    </div>

    <script>
        // Auto-print on load
        window.onload = function() {
            // Uncomment the line below to auto-print
            // window.print();
        }
    </script>
</body>
</html>
