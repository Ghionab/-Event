{% extends 'events/base.html' %}

{% block title %}Send Message to {{ recipient.email }}{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">Send Message</h4>
                </div>
                <div class="card-body">
                    <p class="text-muted">To: {{ recipient.email }}</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Subject</label>
                            <input type="text" name="subject" class="form-control" placeholder="Message subject">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea name="message" class="form-control" rows="5" placeholder="Write your message..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Related Event (optional)</label>
                            <select name="event_id" class="form-select">
                                <option value="">-- Select Event --</option>
                                {% for reg in user_registrations %}
                                    <option value="{{ reg.event.id }}">{{ reg.event.title }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'attendee_messages' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Send Message</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
