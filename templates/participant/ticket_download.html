<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket - {{ registration.event.title }}</title>
    <!-- Tailwind -> using CDN for printable view -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @media print {
            body {
                background-color: white !important;
                margin: 0;
                padding: 0;
            }

            .no-print {
                display: none !important;
            }

            .print-only {
                display: block !important;
            }

            .ticket-card {
                box-shadow: none !important;
                border: 2px solid #e5e7eb !important;
                border-radius: 12px;
            }

            @page {
                margin: 2cm;
                size: auto;
            }
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen py-10">
    <div class="max-w-2xl mx-auto px-4">
        <!-- Actions -->
        <div class="mb-6 flex justify-between items-center no-print">
            <a href="javascript:history.back()"
                class="text-gray-600 hover:text-gray-900 font-medium pb-1 border-b-2 border-transparent hover:border-gray-900 transition flex items-center gap-2">
                <i class="bi bi-arrow-left"></i> Back
            </a>
            <div class="flex gap-4">
                <button onclick="window.print()"
                    class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium shadow hover:bg-indigo-700 transition flex items-center gap-2">
                    <i class="bi bi-printer"></i> Print Ticket
                </button>
            </div>
        </div>

        <!-- Ticket -->
        {% include 'participant/partials/ticket_pass.html' %}
    </div>
</body>

</html>
