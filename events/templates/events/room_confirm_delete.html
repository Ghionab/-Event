{% extends 'events/base.html' %}

{% block title %}Delete Room{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="ea-card overflow-hidden">
        <div class="bg-red-500 px-6 py-4">
            <h1 class="text-xl font-heading font-bold text-white"><i class="bi bi-exclamation-triangle mr-2"></i>Delete Room</h1>
        </div>

        <div class="p-6">
            <p class="text-gray-700 text-lg mb-4">Are you sure you want to delete <strong class="text-gray-900">{{ room.name }}</strong>?</p>

            <div class="p-4 rounded-lg bg-yellow-50 border border-yellow-200 text-yellow-700 mb-6">
                <div class="flex items-start">
                    <i class="bi bi-exclamation-triangle mt-0.5 mr-2"></i>
                    <div>
                        <p class="font-medium">Warning</p>
                        <p class="text-sm mt-1">Sessions assigned to this room will not be deleted, but they will lose their room assignment.</p>
                    </div>
                </div>
            </div>

            <form method="post" class="flex flex-col sm:flex-row gap-4 justify-end">
                <a href="{% url 'room_list' event.id %}" class="ea-btn ea-btn-secondary">
                    <i class="bi bi-x-lg mr-2"></i> Cancel
                </a>
                <button type="submit" class="ea-btn bg-red-600 text-white hover:bg-red-700 border-red-600">
                    <i class="bi bi-trash mr-2"></i> Yes, Delete Room
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
