{% extends 'participant/base.html' %}

{% block title %}Event Details - EventAxis{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12" id="eventContainer">
    <!-- Loading State -->
    <div class="text-center py-12">
        <i class="bi bi-arrow-repeat ea-spin text-primary text-4xl"></i>
        <p class="text-gray-500 mt-4">Loading event...</p>
    </div>
</div>

<script>
    // Extract event_id from URL path
    const pathParts = window.location.pathname.split('/');
    const eventsIndex = pathParts.indexOf('events');
    const eventId = eventsIndex !== -1 ? pathParts[eventsIndex + 1] : null;
    let eventData = null;
    let ticketsData = [];

    document.addEventListener('DOMContentLoaded', function() {
        if (eventId) {
            loadEventAndTickets();
        } else {
            console.error('Event ID not found in URL');
            showError();
        }
    });

    function loadEventAndTickets() {
        // Fetch event and tickets in parallel
        Promise.all([
            fetch(`/api/v1/public/events/${eventId}/`).then(r => {
                if (!r.ok) {
                    throw new Error(`Event not found (${r.status})`);
                }
                return r.json();
            }),
            fetch(`/api/v1/public/events/${eventId}/tickets/`).then(r => {
                if (!r.ok) {
                    throw new Error(`Tickets not found (${r.status})`);
                }
                return r.json();
            })
        ])
        .then(([event, tickets]) => {
            eventData = event;
            ticketsData = tickets;
            renderEvent(event, tickets);
        })
        .catch(error => {
            console.error('Error loading event data:', error);
            showError(error.message || 'Unknown error');
        });
    }

    function renderEvent(event, tickets) {
        const container = document.getElementById('eventContainer');
        
        // Apply event theme colors as CSS variables
        const themeColors = {
            primary: event.primary_color || '#4f46e5',
            secondary: event.secondary_color || '#6b7280',
            accent: event.accent_color || '#10b981',
            background: event.background_color || '#f9fafb'
        };
        
        // Inject premium theme CSS for 10/10 professional look
        let themeStyle = document.getElementById('event-theme-style');
        if (!themeStyle) {
            themeStyle = document.createElement('style');
            themeStyle.id = 'event-theme-style';
            document.head.appendChild(themeStyle);
        }
        
        // Generate premium CSS with sophisticated styling
        const primaryDark = adjustColorBrightness(themeColors.primary, -15);
        const primaryLight = adjustColorBrightness(themeColors.primary, 15);
        const secondaryLight = adjustColorBrightness(themeColors.secondary, 40);
        
        themeStyle.textContent = `
            /* Core Theme Colors */
            .event-theme-primary { color: ${themeColors.primary} !important; }
            .event-theme-bg-primary { 
                background-color: ${themeColors.primary} !important; 
                transition: all 0.3s ease !important;
            }
            .event-theme-border-primary { border-color: ${themeColors.primary} !important; }
            .event-theme-secondary { color: ${themeColors.secondary} !important; }
            .event-theme-bg-secondary { 
                background-color: ${themeColors.secondary} !important;
                transition: all 0.3s ease !important;
            }
            .event-theme-accent { color: ${themeColors.accent} !important; }
            .event-theme-bg-accent { 
                background-color: ${themeColors.accent} !important;
                transition: all 0.3s ease !important;
            }
            .event-theme-bg-light { 
                background-color: ${themeColors.background} !important;
            }
            
            /* Premium Gradients */
            .event-gradient { 
                background: linear-gradient(135deg, ${themeColors.secondary} 0%, ${themeColors.primary} 50%, ${themeColors.accent} 100%) !important;
                position: relative;
                overflow: hidden;
            }
            .event-gradient::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: linear-gradient(45deg, rgba(255,255,255,0.1) 0%, transparent 50%, rgba(0,0,0,0.1) 100%);
                pointer-events: none;
            }
            
            /* Premium Buttons */
            .event-btn-primary {
                background: linear-gradient(135deg, ${themeColors.primary} 0%, ${primaryDark} 100%) !important;
                border: none !important;
                box-shadow: 0 4px 15px ${themeColors.primary}40 !important;
                transition: all 0.3s ease !important;
                font-weight: 600 !important;
                letter-spacing: 0.5px !important;
            }
            .event-btn-primary:hover { 
                transform: translateY(-2px) !important;
                box-shadow: 0 8px 25px ${themeColors.primary}60 !important;
                background: linear-gradient(135deg, ${primaryLight} 0%, ${themeColors.primary} 100%) !important;
            }
            
            /* Premium Cards */
            .event-card {
                background: white !important;
                border-radius: 16px !important;
                box-shadow: 0 4px 20px ${themeColors.secondary}15 !important;
                transition: all 0.3s ease !important;
                border: 1px solid ${themeColors.secondary}10 !important;
            }
            .event-card:hover {
                box-shadow: 0 8px 30px ${themeColors.secondary}25 !important;
                transform: translateY(-4px) !important;
            }
            
            /* Ticket Selection Cards */
            .ticket-card {
                border: 2px solid ${themeColors.secondary}15 !important;
                border-radius: 12px !important;
                transition: all 0.3s ease !important;
                background: white !important;
            }
            .ticket-card:hover {
                border-color: ${themeColors.primary} !important;
                box-shadow: 0 4px 20px ${themeColors.primary}20 !important;
            }
            .ticket-card.selected {
                border-color: ${themeColors.primary} !important;
                background: ${themeColors.background} !important;
                box-shadow: 0 4px 20px ${themeColors.primary}30 !important;
            }
            
            /* Price Display */
            .event-price {
                color: ${themeColors.primary} !important;
                font-weight: 700 !important;
                font-size: 1.5rem !important;
                text-shadow: 0 2px 4px ${themeColors.primary}20 !important;
            }
            
            /* Section Headers */
            .event-section-title {
                color: ${themeColors.secondary} !important;
                font-weight: 700 !important;
                letter-spacing: -0.5px !important;
                border-bottom: 3px solid ${themeColors.primary} !important;
                padding-bottom: 0.5rem !important;
                display: inline-block !important;
            }
            
            /* Badge Styling */
            .event-badge {
                background: linear-gradient(135deg, ${themeColors.accent} 0%, ${adjustColorBrightness(themeColors.accent, -10)} 100%) !important;
                color: white !important;
                font-weight: 600 !important;
                padding: 0.5rem 1rem !important;
                border-radius: 20px !important;
                box-shadow: 0 2px 10px ${themeColors.accent}40 !important;
            }
            
            /* Icon Styling */
            .event-icon {
                color: ${themeColors.primary} !important;
                filter: drop-shadow(0 2px 4px ${themeColors.primary}30) !important;
            }
            
            /* Form Elements */
            .event-input:focus {
                border-color: ${themeColors.primary} !important;
                box-shadow: 0 0 0 3px ${themeColors.primary}20 !important;
            }
            
            /* Info Cards */
            .event-info-card {
                background: linear-gradient(135deg, white 0%, ${themeColors.background} 100%) !important;
                border-left: 4px solid ${themeColors.primary} !important;
                border-radius: 12px !important;
                padding: 1.5rem !important;
            }
            
            /* Premium Ticket Cards */
            .ticket-card {
                position: relative !important;
                overflow: hidden !important;
                transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
            }
            
            .ticket-card::before {
                content: '' !important;
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                right: 0 !important;
                height: 4px !important;
                background: linear-gradient(90deg, ${themeColors.primary} 0%, ${themeColors.accent} 50%, ${themeColors.secondary} 100%) !important;
                opacity: 0 !important;
                transition: opacity 0.3s ease !important;
            }
            
            .ticket-card:hover::before {
                opacity: 1 !important;
            }
            
            .ticket-card.popular {
                border-color: #f59e0b !important;
                box-shadow: 0 4px 20px rgba(245, 158, 11, 0.15) !important;
            }
            
            .ticket-card.popular::before {
                opacity: 1 !important;
                background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 100%) !important;
            }
            
            .ticket-card.recommended {
                border-color: #10b981 !important;
                box-shadow: 0 4px 20px rgba(16, 185, 129, 0.15) !important;
            }
            
            .ticket-card.recommended::before {
                opacity: 1 !important;
                background: linear-gradient(90deg, #10b981 0%, #34d399 100%) !important;
            }
            
            .ticket-card.sold-out {
                opacity: 0.75 !important;
                filter: grayscale(0.3) !important;
            }
            
            .ticket-card.sold-out::before {
                opacity: 1 !important;
                background: linear-gradient(90deg, #ef4444 0%, #f87171 100%) !important;
            }
            
            /* Ticket Header */
            .ticket-header {
                background: linear-gradient(135deg, ${themeColors.primary} 0%, ${themeColors.secondary} 100%) !important;
                padding: 0.75rem 1rem !important;
                border-radius: 10px 10px 0 0 !important;
            }
            
            .ticket-badge {
                background: rgba(255,255,255,0.2) !important;
                backdrop-filter: blur(4px) !important;
                border: 1px solid rgba(255,255,255,0.3) !important;
                color: white !important;
                font-size: 10px !important;
                font-weight: 700 !important;
                text-transform: uppercase !important;
                letter-spacing: 0.1em !important;
                padding: 0.25rem 0.75rem !important;
                border-radius: 20px !important;
            }
            
            /* Ticket Price */
            .ticket-price {
                background: linear-gradient(135deg, ${themeColors.primary} 0%, ${themeColors.secondary} 100%) !important;
                -webkit-background-clip: text !important;
                -webkit-text-fill-color: transparent !important;
                background-clip: text !important;
            }
            
            .ticket-price.text-green-600 {
                background: linear-gradient(135deg, #10b981 0%, #34d399 100%) !important;
                -webkit-background-clip: text !important;
                -webkit-text-fill-color: transparent !important;
                background-clip: text !important;
            }
            
            /* Ticket Select Button */
            .ticket-select-btn {
                background: linear-gradient(135deg, ${themeColors.primary} 0%, ${themeColors.secondary} 100%) !important;
                color: white !important;
                border: none !important;
                position: relative !important;
                overflow: hidden !important;
            }
            
            .ticket-select-btn::after {
                content: '' !important;
                position: absolute !important;
                top: 0 !important;
                left: -100% !important;
                width: 100% !important;
                height: 100% !important;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent) !important;
                transition: left 0.5s ease !important;
            }
            
            .ticket-select-btn:hover::after {
                left: 100% !important;
            }
            
            /* Selected State Animation */
            .ticket-card.selected {
                transform: translateY(-4px) scale(1.02) !important;
            }
        `;

        // Determine if there are paid tickets
        const hasPaidTickets = tickets.some(t => parseFloat(t.price) > 0);
        const allFree = tickets.length === 0 || tickets.every(t => parseFloat(t.price) === 0);

        container.innerHTML = `
            <!-- Premium Event Header -->
            <div class="event-card overflow-hidden mb-8">
                <div class="h-72 event-gradient flex items-center justify-center relative">
                    ${event.banner_image ? 
                        `<img src="${event.banner_image}" alt="${event.title}" class="h-full w-full object-cover absolute inset-0 opacity-90">` :
                        event.logo ? 
                        `<img src="${event.logo}" alt="${event.title}" class="h-48 w-48 object-contain z-10 drop-shadow-2xl">` :
                        `<div class="text-center z-10">
                            <i class="bi bi-star text-white text-7xl mb-4 opacity-90"></i>
                            <p class="text-white text-xl font-light tracking-widest">${formatEventType(event.event_type)}</p>
                         </div>`
                    }
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-black/30"></div>
                    <div class="absolute top-6 left-6 z-20">
                        <a href="/events/" class="bg-white/95 hover:bg-white text-gray-800 px-4 py-2 rounded-full text-sm font-medium transition shadow-lg backdrop-blur-sm">
                            <i class="bi bi-arrow-left mr-2"></i> Back to Events
                        </a>
                    </div>
                    <div class="absolute top-6 right-6 z-20">
                        <span class="event-badge text-sm">
                            ${formatEventType(event.event_type)}
                        </span>
                    </div>
                </div>
                
                <!-- Event Title Section -->
                <div class="p-8 md:p-10 bg-white">
                    <div class="max-w-4xl mx-auto text-center">
                        <h1 class="text-4xl md:text-5xl font-bold event-theme-secondary mb-4 leading-tight">
                            ${event.title}
                        </h1>
                        ${event.description ? 
                            `<p class="text-lg text-gray-600 leading-relaxed max-w-3xl mx-auto">${event.description.substring(0, 200)}${event.description.length > 200 ? '...' : ''}</p>` 
                            : ''}
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Left Column: Event Details -->
                <div class="lg:col-span-2 space-y-8">
                    
                    <!-- Quick Info Cards -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="event-info-card">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-xl event-theme-bg-primary flex items-center justify-center">
                                    <i class="bi bi-calendar-event text-white text-xl"></i>
                                </div>
                                <div>
                                    <p class="text-xs text-gray-500 uppercase tracking-wide font-semibold">Date</p>
                                    <p class="font-semibold event-theme-secondary">${formatDate(event.start_date)}</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="event-info-card">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-xl event-theme-bg-accent flex items-center justify-center">
                                    <i class="bi bi-clock text-white text-xl"></i>
                                </div>
                                <div>
                                    <p class="text-xs text-gray-500 uppercase tracking-wide font-semibold">Time</p>
                                    <p class="font-semibold event-theme-secondary">${formatTime(event.start_date)} - ${formatTime(event.end_date)}</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="event-info-card">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-xl event-theme-bg-secondary flex items-center justify-center">
                                    <i class="bi bi-geo-alt-fill text-white text-xl"></i>
                                </div>
                                <div>
                                    <p class="text-xs text-gray-500 uppercase tracking-wide font-semibold">Location</p>
                                    <p class="font-semibold event-theme-secondary">${event.city || 'Virtual'}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center">
                        <div>
                            <h1 class="text-3xl font-bold text-gray-900 mt-3">${event.title}</h1>
                            <p class="text-gray-500 mt-2">${event.description || 'No description available'}</p>
                            ${event.city || event.country ? `
                            <p class="text-gray-400 mt-2">
                                <i class="bi bi-geo-alt-fill mr-2"></i>
                                ${event.venue_name || ''} ${event.city ? ', ' + event.city : ''} ${event.country ? ', ' + event.country : ''}
                            </p>
                            ` : ''}
                        </div>
                        <div class="mt-4 md:mt-0">
                            ${tickets.length > 0 ? `
                                <button onclick="scrollToTickets()" class="inline-block event-theme-bg-primary text-white px-8 py-3 rounded-lg font-bold event-btn-primary transition" style="background-color: ${themeColors.primary};">
                                    Get Tickets
                                </button>
                            ` : `
                                <a href="/events/${eventId}/register/" class="inline-block event-theme-bg-primary text-white px-8 py-3 rounded-lg font-bold event-btn-primary transition" style="background-color: ${themeColors.primary};">
                                    Register Now
                                </a>
                            `}
                        </div>
                    </div>

                    <div class="grid md:grid-cols-3 gap-6 mt-8 pt-8 border-t">
                        <div class="flex items-center">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center mr-4 event-theme-bg-light" style="background-color: ${themeColors.background};">
                                <i class="bi bi-calendar event-theme-primary" style="color: ${themeColors.primary};"></i>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">Start Date</p>
                                <p class="font-semibold">${formatDate(event.start_date)}</p>
                            </div>
                        </div>
                        <div class="flex items-center">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center mr-4 event-theme-bg-light" style="background-color: ${themeColors.background};">
                                <i class="bi bi-calendar-check event-theme-primary" style="color: ${themeColors.primary};"></i>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">End Date</p>
                                <p class="font-semibold">${formatDate(event.end_date)}</p>
                            </div>
                        </div>
                        <div class="flex items-center">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center mr-4 event-theme-bg-light" style="background-color: ${themeColors.background};">
                                <i class="bi bi-tag event-theme-accent" style="color: ${themeColors.accent};"></i>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">Status</p>
                                <p class="font-semibold capitalize">${event.status || 'Open'}</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Event Details -->
            <div class="grid md:grid-cols-3 gap-8">
                <div class="md:col-span-2">
                    <div class="bg-white rounded-xl shadow-sm p-8">
                        <h2 class="text-xl font-bold mb-4">About This Event</h2>
                        <div class="prose max-w-none text-gray-600">
                            <p>${event.description || 'No description available for this event.'}</p>
                        </div>

                        ${event.virtual_meeting_url ? `
                        <div class="mt-8 p-4 rounded-lg border event-theme-bg-light" style="background-color: ${themeColors.background}; border-color: ${themeColors.primary};">
                            <h3 class="font-semibold mb-2 event-theme-primary" style="color: ${themeColors.primary};">
                                <i class="bi bi-camera-video mr-2"></i>Virtual Event
                            </h3>
                            <p class="event-theme-secondary" style="color: ${themeColors.secondary};">This event has a virtual component.</p>
                        </div>
                        ` : ''}
                    </div>

                    <!-- Sessions & Speakers Section -->
                    ${renderSessionsSection(event, themeColors)}
                </div>

                <div id="ticketsSection">
                    <div class="bg-white rounded-xl shadow-sm p-6 sticky top-24">
                        <h3 class="text-lg font-bold mb-4">
                            <i class="bi bi-ticket-perforated mr-2 event-theme-primary" style="color: ${themeColors.primary};"></i>Tickets
                        </h3>

                        ${tickets.length > 0 ? `
                        <div class="space-y-4" id="ticketsList">
                            ${tickets.map(ticket => renderTicketCard(ticket, themeColors, event)).join('')}
                        </div>

                        <!-- Promo Code Section -->
                        <div class="mt-6 pt-6 border-t">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Promo Code</label>
                            <div class="flex gap-2">
                                <input type="text" id="promoCode" placeholder="Enter code" class="flex-1 px-3 py-2 border rounded-lg text-sm">
                                <button onclick="applyPromoCode()" class="px-4 py-2 rounded-lg text-sm transition" style="background-color: ${themeColors.secondary}; color: white;">
                                    Apply
                                </button>
                            </div>
                            <p id="promoMessage" class="text-sm mt-2 hidden"></p>
                        </div>

                        <div class="mt-6 pt-6 border-t">
                            <div class="flex justify-between items-center mb-4">
                                <span class="font-semibold">Total:</span>
                                <span class="text-2xl font-bold event-theme-primary" id="totalPrice" style="color: ${themeColors.primary};">$${calculateTotal()}</span>
                            </div>
                            <button onclick="proceedToCheckout()" class="w-full text-white py-3 rounded-lg font-bold event-btn-primary transition" style="background-color: ${themeColors.primary};">
                                ${hasPaidTickets ? 'Buy Now' : 'Register Free'}
                            </button>
                        </div>
                        ` : `
                        <div class="text-center py-6 text-gray-500">
                            <i class="bi bi-ticket-perforated text-gray-300 text-4xl mb-3"></i>
                            <p>No tickets available yet</p>
                            <a href="/events/${eventId}/register/" class="mt-4 inline-block event-theme-primary hover:opacity-80 transition" style="color: ${themeColors.primary};">
                                Register for updates
                            </a>
                        </div>
                        `}

                        <div class="mt-6 pt-6 border-t">
                            <h4 class="font-semibold mb-3">Share This Event</h4>
                            <div class="flex space-x-3">
                                <button onclick="shareEvent('twitter')" class="w-10 h-10 text-white rounded-full flex items-center justify-center transition" style="background-color: #1DA1F2;">
                                    <i class="bi bi-twitter"></i>
                                </button>
                                <button onclick="shareEvent('facebook')" class="w-10 h-10 text-white rounded-full flex items-center justify-center transition" style="background-color: #4267B2;">
                                    <i class="bi bi-facebook"></i>
                                </button>
                                <button onclick="shareEvent('linkedin')" class="w-10 h-10 text-white rounded-full flex items-center justify-center transition" style="background-color: #0077b5;">
                                    <i class="bi bi-linkedin"></i>
                                </button>
                                <button onclick="shareEvent('copy')" class="w-10 h-10 rounded-full flex items-center justify-center transition" style="background-color: ${themeColors.secondary}; color: white;" title="Copy link">
                                    <i class="bi bi-link-45deg"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    function renderTicketCard(ticket, themeColors, event) {
        const price = parseFloat(ticket.price);
        const isFree = price === 0;
        const available = ticket.available;
        const isSoldOut = available <= 0;
        const isPopular = ticket.popular || ticket.sold_count > 50;
        const isRecommended = ticket.recommended || ticket.ticket_category?.toLowerCase().includes('vip');

        return `
            <div class="ticket-card ${isSoldOut ? 'sold-out' : ''} ${isPopular ? 'popular' : ''} ${isRecommended ? 'recommended' : ''} border-2 ${isSoldOut ? 'border-gray-200' : 'border-transparent'}">
                <!-- Ticket Header with Category & Badges -->
                <div class="ticket-header flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <i class="bi bi-ticket-perforated text-white/80"></i>
                        <span class="ticket-badge">${ticket.ticket_category || 'GENERAL'}</span>
                        ${event.logo ? `<img src="${event.logo}" alt="" class="w-4 h-4 object-contain rounded-sm opacity-80">` : ''}
                    </div>
                    <div class="flex items-center gap-2">
                        ${isPopular ? '<span class="text-[10px] font-bold text-white/90 bg-amber-500 px-2 py-1 rounded-full uppercase tracking-wider shadow-sm"><i class="bi bi-fire mr-1"></i>POPULAR</span>' : ''}
                        ${isRecommended ? '<span class="text-[10px] font-bold text-white/90 bg-emerald-500 px-2 py-1 rounded-full uppercase tracking-wider shadow-sm"><i class="bi bi-star-fill mr-1"></i>BEST VALUE</span>' : ''}
                        ${isSoldOut ? '<span class="text-xs font-bold text-white/90 bg-red-500 px-3 py-1.5 rounded-lg shadow-sm">SOLD OUT</span>' : ''}
                    </div>
                </div>
                
                <!-- Ticket Body -->
                <div class="p-5 relative">
                    <!-- Logo Watermark Background -->
                    ${event.logo ? `
                    <div class="absolute top-2 right-2 opacity-[0.03] pointer-events-none">
                        <img src="${event.logo}" alt="" class="w-32 h-32 object-contain grayscale">
                    </div>
                    ` : ''}
                    
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <h4 class="text-lg font-bold text-gray-900 mb-1">${ticket.name}</h4>
                            ${ticket.description ? `<p class="text-sm text-gray-500 line-clamp-2 leading-relaxed">${ticket.description}</p>` : ''}
                        </div>
                        <div class="text-right ml-4">
                            <div class="ticket-price ${isFree ? 'text-green-600' : ''} text-2xl font-black tracking-tight">
                                ${isFree ? 'FREE' : '$' + price.toFixed(2)}
                            </div>
                            ${isSoldOut ? '' : `<span class="text-xs text-gray-400 font-medium flex items-center justify-end gap-1">
                                <span class="w-1.5 h-1.5 rounded-full ${available < 10 ? 'bg-red-400' : 'bg-green-400'}"></span>
                                ${available} tickets left
                            </span>`}
                        </div>
                    </div>
                    
                    <!-- Features List (if available) -->
                    ${ticket.features ? `
                    <div class="mb-4">
                        <ul class="space-y-1">
                            ${ticket.features.map(feature => `
                                <li class="text-xs text-gray-600 flex items-center gap-1.5">
                                    <i class="bi bi-check-lg text-green-500 text-[10px]"></i>
                                    ${feature}
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                    ` : ''}
                    
                    <!-- Single Ticket Selection -->
                    <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-100">
                        
                        <!-- Hidden checkbox for backward compatibility -->
                        <input type="checkbox" class="ticket-checkbox hidden" data-ticket-id="${ticket.id}" data-price="${price}" 
                               ${isSoldOut ? 'disabled' : ''} onchange="updateTicketQuantity(${ticket.id}, this.checked ? 1 : 0)">
                        
                        ${isSoldOut 
                            ? '<span class="text-sm text-gray-400 font-medium px-4 py-2"><i class="bi bi-ban mr-1.5"></i>Unavailable</span>'
                            : `<button onclick="toggleTicketSelection(${ticket.id})" id="btn-${ticket.id}" 
                                class="ticket-select-btn px-6 py-2.5 text-sm font-bold rounded-full shadow-sm hover:shadow-md transition-all active:scale-95">
                                <i class="bi bi-cart-plus mr-2"></i>Select Ticket
                             </button>`
                        }
                    </div>
                </div>
                
                <!-- Decorative Ticket Notches -->
                <div class="absolute -left-2 top-1/2 -translate-y-1/2 w-4 h-4 bg-gray-50 rounded-full shadow-inner"></div>
                <div class="absolute -right-2 top-1/2 -translate-y-1/2 w-4 h-4 bg-gray-50 rounded-full shadow-inner"></div>
            </div>
        `;
    }

    function calculateTotal() {
        let total = 0;
        document.querySelectorAll('.ticket-checkbox:checked').forEach(checkbox => {
            total += parseFloat(checkbox.dataset.price);
        });
        return total.toFixed(2);
    }

    function updateTotal() {
        const totalEl = document.getElementById('totalPrice');
        if (totalEl) {
            totalEl.textContent = '$' + calculateTotal();
        }
    }

    function scrollToTickets() {
        document.getElementById('ticketsSection').scrollIntoView({ behavior: 'smooth' });
    }

    let appliedPromo = null;

    function applyPromoCode() {
        const code = document.getElementById('promoCode').value.trim();
        if (!code) return;

        fetch(`/api/v1/public/events/${eventId}/validate_promo/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: code })
        })
        .then(r => r.json())
        .then(data => {
            const msgEl = document.getElementById('promoMessage');
            msgEl.classList.remove('hidden', 'text-green-600', 'text-red-600');

            if (data.valid) {
                appliedPromo = data;
                msgEl.classList.add('text-green-600');
                msgEl.textContent = `Promo applied! ${data.discount_type === 'percentage' ? data.discount_value + '%' : '$' + data.discount_value} off`;
            } else {
                appliedPromo = null;
                msgEl.classList.add('text-red-600');
                msgEl.textContent = data.error || 'Invalid promo code';
            }
        })
        .catch(() => {
            const msgEl = document.getElementById('promoMessage');
            msgEl.classList.remove('hidden');
            msgEl.classList.add('text-red-600');
            msgEl.textContent = 'Error validating promo code';
        });
    }

    function proceedToCheckout() {
        // Get selected tickets
        const selectedTickets = [];
        document.querySelectorAll('.ticket-checkbox:checked').forEach(checkbox => {
            const ticketId = parseInt(checkbox.dataset.ticketId);
            const qtyEl = document.getElementById(`qty-${ticketId}`);
            const quantity = qtyEl ? parseInt(qtyEl.textContent) || 1 : 1;
            
            selectedTickets.push({
                ticket_id: ticketId,
                ticket_name: checkbox.dataset.ticketName,
                quantity: quantity
            });
        });

        if (selectedTickets.length === 0) {
            alert('Please select at least one ticket');
            return;
        }

        // Store selection in sessionStorage and redirect to registration
        sessionStorage.setItem('selectedTickets', JSON.stringify(selectedTickets));
        sessionStorage.setItem('eventId', eventId);

        // Redirect to registration page
        window.location.href = `/events/${eventId}/register/`;
    }

    function adjustColorBrightness(hex, percent) {
        // Helper to lighten/darken hex color
        const num = parseInt(hex.replace("#", ""), 16);
        const amt = Math.round(2.55 * percent);
        const R = (num >> 16) + amt;
        const G = (num >> 8 & 0x00FF) + amt;
        const B = (num & 0x0000FF) + amt;
        return "#" + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
            (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
            (B < 255 ? B < 1 ? 0 : B : 255))
            .toString(16).slice(1);
    }

    function toggleTicketSelection(ticketId) {
        const checkbox = document.querySelector(`.ticket-checkbox[data-ticket-id="${ticketId}"]`);
        const btn = document.getElementById(`btn-${ticketId}`);
        
        if (!checkbox || !btn) return;
        
        // Toggle selection (only allow one ticket at a time)
        const wasSelected = checkbox.checked;
        
        // Clear all other selections first
        document.querySelectorAll('.ticket-checkbox').forEach(cb => {
            cb.checked = false;
        });
        
        document.querySelectorAll('[id^="btn-"]').forEach(button => {
            button.innerHTML = '<i class="bi bi-cart-plus mr-2"></i>Select Ticket';
            button.classList.remove('selected');
        });
        
        // Select this ticket if it wasn't selected before
        if (!wasSelected) {
            checkbox.checked = true;
            btn.innerHTML = '<i class="bi bi-check-lg mr-2"></i>Selected';
            btn.classList.add('selected');
        }
        
        // Update total
        updateTotal();
    }

    function updateTicketQuantity(ticketId, quantity) {
        // For backward compatibility - always set to 1 or 0
        const checkbox = document.querySelector(`.ticket-checkbox[data-ticket-id="${ticketId}"]`);
        const btn = document.getElementById(`btn-${ticketId}`);
        
        if (!checkbox) return;
        
        checkbox.checked = quantity > 0;
        
        if (btn) {
            if (quantity > 0) {
                btn.innerHTML = '<i class="bi bi-check-lg mr-2"></i>Selected';
                btn.classList.add('selected');
            } else {
                btn.innerHTML = '<i class="bi bi-cart-plus mr-2"></i>Select Ticket';
                btn.classList.remove('selected');
            }
        }
        
        updateTotal();
    }

    function showError(errorMessage = '') {
        const container = document.getElementById('eventContainer');
        container.innerHTML = `
            <div class="bg-white rounded-xl shadow-sm p-12 text-center">
                <i class="bi bi-exclamation-circle-fill text-gray-300 text-6xl mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-900 mb-2">Event Not Found</h2>
                <p class="text-gray-500 mb-4">The event you're looking for doesn't exist or has been removed.</p>
                ${errorMessage ? `<p class="text-red-500 text-sm mb-4 font-mono bg-red-50 p-2 rounded">Error: ${errorMessage}</p>` : ''}
                <a href="/events/" class="ea-btn ea-btn-primary ea-btn-lg">
                    Browse Events
                </a>
            </div>
        `;
    }

    function formatDate(dateString) {
        if (!dateString) return 'TBD';
        const date = new Date(dateString);
        return date.toLocaleDateString('en-US', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
    }

    function formatTime(dateString) {
        if (!dateString) return 'TBD';
        const date = new Date(dateString);
        return date.toLocaleTimeString('en-US', {
            hour: 'numeric',
            minute: '2-digit',
            hour12: true
        });
    }

    function formatEventType(type) {
        if (!type) return 'Event';
        return type.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
    }

    function shareEvent(platform) {
        const url = window.location.href;
        const title = document.querySelector('h1')?.textContent || 'Event';

        switch(platform) {
            case 'twitter':
                window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(title)}`, '_blank');
                break;
            case 'facebook':
                window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
                break;
            case 'linkedin':
                window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}`, '_blank');
                break;
            case 'copy':
                navigator.clipboard.writeText(url).then(() => {
                    alert('Link copied to clipboard!');
                });
                break;
        }
    }

    // Helper function to format time (handles both DateTime and TimeField)
    function formatTime(timeStr) {
        if (!timeStr) return '';
        
        // Check if it's a time string (HH:MM:SS) from TimeField
        if (typeof timeStr === 'string' && timeStr.includes(':')) {
            const [hours, minutes] = timeStr.split(':');
            const hour = parseInt(hours);
            const minute = parseInt(minutes);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            const displayHour = hour > 12 ? hour - 12 : (hour === 0 ? 12 : hour);
            return `${displayHour}:${minute.toString().padStart(2, '0')} ${ampm}`;
        }
        
        // Otherwise treat as DateTime string
        const date = new Date(timeStr);
        if (isNaN(date.getTime())) return '';
        return date.toLocaleTimeString('en-US', { 
            hour: 'numeric', 
            minute: '2-digit',
            hour12: true 
        });
    }

    // Helper function to format date for sessions
    function formatSessionDate(dateTimeStr) {
        if (!dateTimeStr) return '';
        const date = new Date(dateTimeStr);
        return date.toLocaleDateString('en-US', { 
            weekday: 'short',
            month: 'short', 
            day: 'numeric' 
        });
    }

    // Render Sessions & Speakers Section
    function renderSessionsSection(event, themeColors) {
        // Combine both types of sessions
        const allSessions = [];
        
        // Add EventSessions with speakers
        if (event.sessions && event.sessions.length > 0) {
            event.sessions.forEach(session => {
                allSessions.push({
                    ...session,
                    session_type: 'EventSession',
                    start_time: session.start_time,
                    end_time: session.end_time,
                    speakers: session.speakers || []
                });
            });
        }
        
        // Add Dynamic Sessions with their speakers
        if (event.dynamic_sessions && event.dynamic_sessions.length > 0) {
            event.dynamic_sessions.forEach(session => {
                // Convert session_speakers to speakers format for consistency
                const speakers = session.session_speakers || [];
                allSessions.push({
                    ...session,
                    session_type: 'DynamicSession',
                    start_time: session.session_start_time,
                    end_time: session.session_end_time,
                    speakers: speakers.map(s => ({
                        name: s.speaker_name,
                        bio: s.speaker_bio,
                        photo: s.speaker_profile_picture,
                        linkedin_url: s.speaker_linkedin_url,
                        start_time: s.speaker_start_time,
                        end_time: s.speaker_end_time
                    }))
                });
            });
        }

        // Sort sessions by start time
        allSessions.sort((a, b) => new Date(a.start_time) - new Date(b.start_time));

        if (allSessions.length === 0) {
            return `
                <div class="bg-white rounded-xl shadow-sm p-8 mt-8">
                    <h2 class="text-2xl font-bold mb-6 event-theme-secondary" style="color: ${themeColors.secondary};">
                        <i class="bi bi-calendar-event mr-3 event-theme-primary" style="color: ${themeColors.primary};"></i>
                        Event Schedule & Sessions
                    </h2>
                    <div class="text-center py-12 text-gray-500">
                        <i class="bi bi-calendar-x text-4xl mb-4"></i>
                        <p class="text-lg">No sessions scheduled yet</p>
                        <p class="text-sm mt-2">Check back later for the complete schedule.</p>
                    </div>
                </div>
            `;
        }

        return `
            <div class="bg-white rounded-xl shadow-sm p-8 mt-8">
                <h2 class="text-2xl font-bold mb-6 event-theme-secondary" style="color: ${themeColors.secondary};">
                    <i class="bi bi-calendar-event mr-3 event-theme-primary" style="color: ${themeColors.primary};"></i>
                    Event Schedule & Sessions
                </h2>
                
                <div class="space-y-6">
                    ${allSessions.map(session => renderSessionCard(session, themeColors, event)).join('')}
                </div>
            </div>
        `;
    }

    // Render individual session card
    function renderSessionCard(session, themeColors, event) {
        const hasSpeakers = session.speakers && session.speakers.length > 0;
        const sessionTime = session.start_time && session.end_time ? 
            `${formatSessionDate(session.start_time)} • ${formatTime(session.start_time)} - ${formatTime(session.end_time)}` : 
            'Time TBD';

        return `
            <div class="border border-gray-200 rounded-xl overflow-hidden hover:shadow-lg transition-shadow duration-300" style="border-color: ${themeColors.secondary}20;">
                <!-- Session Header -->
                <div class="bg-gradient-to-r from-gray-50 to-gray-100 p-6 border-b" style="border-color: ${themeColors.secondary}20;">
                    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                        <div class="flex-1">
                            <h3 class="text-xl font-bold text-gray-900 mb-2">${session.title}</h3>
                            <div class="flex items-center gap-4 text-sm text-gray-600">
                                <span class="flex items-center gap-1">
                                    <i class="bi bi-clock event-theme-primary" style="color: ${themeColors.primary};"></i>
                                    ${sessionTime}
                                </span>
                                ${session.location ? `
                                <span class="flex items-center gap-1">
                                    <i class="bi bi-geo-alt-fill event-theme-accent" style="color: ${themeColors.accent};"></i>
                                    ${session.location}
                                </span>
                                ` : ''}
                            </div>
                        </div>
                        ${session.session_type ? `
                        <div class="px-3 py-1 rounded-full text-xs font-medium bg-white border" style="border-color: ${themeColors.primary}40; color: ${themeColors.primary};">
                            ${session.session_type === 'presentation' ? 'Presentation' : 
                              session.session_type === 'workshop' ? 'Workshop' :
                              session.session_type === 'keynote' ? 'Keynote' :
                              session.session_type === 'panel' ? 'Panel' : 'Session'}
                        </div>
                        ` : ''}
                    </div>
                </div>

                <!-- Session Description -->
                ${session.description ? `
                <div class="p-6 border-b" style="border-color: ${themeColors.secondary}20;">
                    <p class="text-gray-600 leading-relaxed">${session.description}</p>
                </div>
                ` : ''}

                <!-- Speakers Section -->
                ${hasSpeakers ? `
                <div class="p-6">
                    <h4 class="text-lg font-semibold mb-4 text-gray-900">
                        <i class="bi bi-mic mr-2 event-theme-primary" style="color: ${themeColors.primary};"></i>
                        Speaker${session.speakers.length > 1 ? 's' : ''}
                    </h4>
                    <div class="space-y-4">
                        ${session.speakers.map(speaker => renderSpeakerCard(speaker, themeColors)).join('')}
                    </div>
                </div>
                ` : ''}
            </div>
        `;
    }

                <div class="flex-shrink-0">

                </div>
                
                <!-- RIGHT SIDE: Speaker Info -->
                <div class="flex-1 min-w-0 flex flex-col justify-center">
                    <div class="mb-3">
                        <h5 class="text-xl font-bold text-gray-900 leading-tight">${speaker.name || 'Speaker'}</h5>
                        ${speakingTime ? `
                        <p class="text-base font-medium event-theme-primary" style="color: ${themeColors.primary};">
                            <i class="bi bi-clock mr-2"></i>${speakingTime}
                        </p>
                        ` : ''}
                    </div>
                    
                    ${speaker.bio ? `
                    <div class="text-gray-600 text-base leading-relaxed">
                        <p>${speaker.bio}</p>
                    </div>
                    ` : ''}
                    
                    <div class="mt-3 flex items-center gap-3">
                        ${speaker.job_title || speaker.company ? `
                        <div class="text-sm text-gray-500">
                            ${speaker.job_title}${speaker.company ? ` at ${speaker.company}` : ''}
                        </div>
                        ` : ''}
                        
                        ${speaker.linkedin_url ? `
                        <a href="${speaker.linkedin_url}" 
                           target="_blank" 
                           class="inline-flex items-center gap-1.5 text-sm font-medium text-blue-600 hover:text-blue-700 transition-colors"
                           title="LinkedIn Profile">
                            <i class="bi bi-linkedin text-lg"></i>
                            <span>LinkedIn</span>

</script>
