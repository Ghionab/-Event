{% extends 'events/base.html' %}

{% block title %}Assign Sessions - {{ speaker.name }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
    <div class="ea-card">
        <div class="ea-card-header">
            <h4 class="text-xl font-heading font-bold">Assign Sessions to {{ speaker.name }}</h4>
        </div>
        <div class="p-6">
            <p class="text-gray-500 mb-4">Select the sessions that this speaker will present.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="flex justify-between mt-6">
                    <a href="{% url 'speaker_list' event.id %}" class="ea-btn ea-btn-secondary">Cancel</a>
                    <button type="submit" class="ea-btn ea-btn-primary">Save Assignments</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
