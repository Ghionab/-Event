{% extends 'participant/base.html' %}

{% block title %}Reset Password — EventAxis{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center py-12 px-4 bg-surface">
    <div class="max-w-md w-full">
        <div class="ea-card p-8 text-center shadow-lg">
            <div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-5">
                <i class="bi bi-shield-lock text-primary text-2xl"></i>
            </div>
            <h2 class="text-2xl font-heading font-bold text-gray-900 mb-2">Reset Password</h2>
            <p class="text-gray-500 text-sm mb-6">Enter your email address and we'll send you a link to reset your password.</p>

            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div class="ea-form-group text-left mb-0">
                    <label for="id_email" class="ea-form-label">Email Address</label>
                    <input type="email" name="email" id="id_email" required
                           class="ea-input"
                           placeholder="you@example.com">
                </div>
                <button type="submit" class="ea-btn ea-btn-accent ea-btn-lg w-full">
                    <i class="bi bi-send mr-2"></i> Send Reset Link
                </button>
            </form>

            <div class="mt-6">
                <a href="/login/" class="text-primary hover:text-primary-dark text-sm font-medium transition-colors">
                    <i class="bi bi-arrow-left mr-1"></i> Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
