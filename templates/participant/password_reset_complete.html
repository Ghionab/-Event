{% extends 'participant/base.html' %}

{% block title %}Password Reset Complete — EventAxis{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center py-12 px-4 bg-surface">
    <div class="max-w-md w-full">
        <div class="ea-card p-8 text-center shadow-lg">
            <div class="w-16 h-16 bg-green-50 rounded-2xl flex items-center justify-center mx-auto mb-5">
                <i class="bi bi-check-circle text-success text-2xl"></i>
            </div>
            <h2 class="text-2xl font-heading font-bold text-gray-900 mb-2">Password Reset Complete</h2>
            <p class="text-gray-500 text-sm mb-6">Your password has been successfully reset. You can now sign in with your new password.</p>
            <a href="/login/" class="ea-btn ea-btn-primary ea-btn-lg">
                <i class="bi bi-box-arrow-in-right mr-2"></i> Sign In
            </a>
        </div>
    </div>
</div>
{% endblock %}
