{% extends 'events/base.html' %}

{% block title %}Assign Sessions - {{ speaker.name }}{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">Assign Sessions to {{ speaker.name }}</h4>
                </div>
                <div class="card-body">
                    <p class="text-muted">Select the sessions that this speaker will present.</p>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'speaker_list' event.id %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Assignments</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
