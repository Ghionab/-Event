{% extends 'participant/base.html' %}

{% block title %}Password Reset Complete - EventPortal{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-xl p-8 text-center">
            <i class="fas fa-check-circle text-green-500 text-4xl mb-4"></i>
            <h2 class="text-2xl font-bold mb-2">Password Reset Complete</h2>
            <p class="text-gray-500 mb-6">Your password has been successfully reset. You can now login with your new password.</p>
            <a href="/login/" class="inline-block bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition">
                Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
