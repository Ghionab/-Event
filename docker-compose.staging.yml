version: '3.9'

services:
  app-attendee:
    image: ghcr.io/ghionab/eventaxis:latest
    container_name: eventaxis_staging_attendee
    environment:
      - DEBUG=0
      - DOMAIN=staging.Eventaxiss.com
      - PORT=8001
      - DJANGO_SETTINGS_MODULE=event_project.settings_production
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=staging.Eventaxiss.com,staging.organizer.Eventaxiss.com
    ports:
      - "8001:8001"
    depends_on:
      - redis
      - db
    networks:
      - eventaxis_staging_network

  app-organizer:
    image: ghcr.io/ghionab/eventaxis:latest
    container_name: eventaxis_staging_organizer
    environment:
      - DEBUG=0
      - DOMAIN=staging.organizer.Eventaxiss.com
      - PORT=8002
      - DJANGO_SETTINGS_MODULE=event_project.settings_production
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=staging.Eventaxiss.com,staging.organizer.Eventaxiss.com
    ports:
      - "8002:8002"
    depends_on:
      - redis
      - db
    networks:
      - eventaxis_staging_network

  redis:
    image: redis:7-alpine
    container_name: eventaxis_staging_redis
    ports:
      - "6379:6379"
    networks:
      - eventaxis_staging_network

  db:
    image: postgres:15-alpine
    container_name: eventaxis_staging_db
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./db/data:/var/lib/postgresql/data
    networks:
      - eventaxis_staging_network

  nginx:
    image: nginx:alpine
    container_name: eventaxis_staging_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./static:/usr/share/nginx/html/static
      - ./media:/usr/share/nginx/html/media
    depends_on:
      - app-attendee
      - app-organizer
    networks:
      - eventaxis_staging_network

networks:
  eventaxis_staging_network:
    driver: bridge
