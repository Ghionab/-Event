{% extends 'events/base.html' %}

{% block title %}Delete Session - {{ event.title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="mb-8">
        <a href="{% url 'session_list' event.id %}" class="inline-flex items-center text-gray-500 hover:text-primary mb-4">
            <i class="bi bi-arrow-left mr-2"></i> Back to Sessions
        </a>
        <h1 class="text-2xl font-bold text-gray-800">Delete Session</h1>
    </div>

    <div class="ea-card overflow-hidden">
        <div class="bg-red-500 px-6 py-4">
            <h1 class="text-xl font-heading font-bold text-white"><i class="bi bi-exclamation-triangle mr-2"></i>Delete Session</h1>
        </div>

        <div class="p-6">
            <p class="text-gray-700 text-lg mb-4">Are you sure you want to delete the session <strong class="text-gray-900">{{ session.title }}</strong>?</p>

            <form method="post" class="flex flex-col sm:flex-row gap-4 justify-end">
                <a href="{% url 'session_list' event.id %}" class="ea-btn ea-btn-secondary">
                    <i class="bi bi-x-lg mr-2"></i> Cancel
                </a>
                <button type="submit" class="ea-btn bg-red-600 text-white hover:bg-red-700 border-red-600">
                    <i class="bi bi-trash mr-2"></i> Delete Session
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
