{% extends 'events/base.html' %}

{% block title %}Password Reset Complete - Event Management System{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="bi bi-check-circle text-3xl text-green-600"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Password Reset Complete</h2>
            </div>

            <div class="text-center">
                <p class="text-gray-600 mb-6">Your password has been set successfully!</p>

                <a href="{% url 'login' %}" class="inline-flex items-center px-6 py-3 bg-primary text-white rounded-lg hover:bg-primaryHover transition font-medium shadow-md">
                    <i class="bi bi-box-arrow-in-right mr-2"></i> Log In
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
