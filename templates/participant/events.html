{% extends 'participant/base.html' %}

{% block title %}Browse Events - EventPortal{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">Browse Events</h1>
            <p class="text-gray-500 mt-1">Discover events happening near you</p>
        </div>
        <div class="mt-4 md:mt-0 flex space-x-4">
            <select class="border border-gray-300 rounded-lg px-4 py-2" onchange="filterByType(this.value)">
                <option value="">All Categories</option>
                <option value="conference">Conference</option>
                <option value="workshop">Workshop</option>
                <option value="meetup">Meetup</option>
                <option value="webinar">Webinar</option>
            </select>
            <select class="border border-gray-300 rounded-lg px-4 py-2" onchange="sortEvents(this.value)">
                <option value="-start_date">Latest First</option>
                <option value="start_date">Earliest First</option>
            </select>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-8">
        <form class="flex flex-col md:flex-row gap-4">
            <div class="flex-1 relative">
                <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Search events..." class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            </div>
            <div class="flex gap-4">
                <input type="date" id="dateInput" class="border border-gray-300 rounded-lg px-4 py-3">
                <button type="button" onclick="searchEvents()" class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
        </form>
    </div>

    <!-- Events Grid -->
    <div id="eventsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Events will be loaded here -->
        <div class="col-span-full text-center py-12">
            <i class="fas fa-spinner fa-spin text-indigo-600 text-3xl"></i>
            <p class="text-gray-500 mt-4">Loading events...</p>
        </div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="mt-12 flex justify-center hidden">
        <nav class="flex items-center space-x-2">
            <button onclick="prevPage()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">Previous</button>
            <span id="pageInfo" class="px-4 py-2 text-gray-600"></span>
            <button onclick="nextPage()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">Next</button>
        </nav>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden">
        <div class="bg-white rounded-xl shadow-sm p-12 text-center">
            <i class="fas fa-calendar-check text-gray-300 text-6xl mb-4"></i>
            <p class="text-gray-500 text-lg">No events found</p>
            <p class="text-gray-400 mb-6">Try adjusting your search or filters</p>
            <button onclick="clearFilters()" class="inline-block bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition">
                Clear Filters
            </button>
        </div>
    </div>
</div>

<script>
    let currentPage = 1;
    let totalPages = 1;
    let events = [];

    // Load events on page load
    document.addEventListener('DOMContentLoaded', function() {
        loadEvents();
    });

    function loadEvents(page = 1) {
        fetch(`/api/v1/public/events/?page=${page}`)
            .then(response => response.json())
            .then(data => {
                events = data.results || [];
                totalPages = Math.ceil((data.count || 0) / 9);
                renderEvents(events);
                updatePagination(data.count, page);
            })
            .catch(error => {
                console.error('Error loading events:', error);
                showEmptyState();
            });
    }

    function renderEvents(eventsList) {
        const grid = document.getElementById('eventsGrid');
        const emptyState = document.getElementById('emptyState');
        const pagination = document.getElementById('pagination');

        if (eventsList.length === 0) {
            grid.innerHTML = '';
            emptyState.classList.remove('hidden');
            pagination.classList.add('hidden');
            return;
        }

        emptyState.classList.add('hidden');
        pagination.classList.remove('hidden');

        grid.innerHTML = eventsList.map(event => `
            <div class="bg-white rounded-xl shadow-sm overflow-hidden card-hover transition cursor-pointer" onclick="viewEvent(${event.id})">
                <div class="h-48 bg-gradient-to-br ${getRandomGradient()} flex items-center justify-center relative">
                    <i class="fas fa-calendar-alt text-white text-6xl opacity-50"></i>
                    <span class="absolute top-4 right-4 bg-white/90 text-gray-800 text-xs font-semibold px-2.5 py-1 rounded">
                        ${event.event_type || 'Event'}
                    </span>
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-bold text-gray-900 mt-3 mb-2 truncate">${event.title}</h3>
                    <p class="text-gray-500 text-sm mb-4 line-clamp-2">${event.description || 'No description available'}</p>
                    <div class="flex items-center text-sm text-gray-500 mb-4">
                        <i class="fas fa-calendar mr-2"></i>
                        <span>${formatDate(event.start_date)}</span>
                        <span class="mx-2">|</span>
                        <i class="fas fa-map-marker-alt mr-2"></i>
                        <span class="truncate">${event.venue_name || 'TBD'} ${event.city ? ', ' + event.city : ''}</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-indigo-600 font-bold">${event.price || 'Free'}</span>
                        <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition text-sm">
                            View Details
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function viewEvent(eventId) {
        window.location.href = `/events/${eventId}/`;
    }

    function updatePagination(count, page) {
        const info = document.getElementById('pageInfo');
        info.textContent = `Page ${page} of ${totalPages || 1} (${count || 0} events)`;
    }

    function prevPage() {
        if (currentPage > 1) {
            currentPage--;
            loadEvents(currentPage);
        }
    }

    function nextPage() {
        if (currentPage < totalPages) {
            currentPage++;
            loadEvents(currentPage);
        }
    }

    function searchEvents() {
        const query = document.getElementById('searchInput').value;
        const date = document.getElementById('dateInput').value;
        let url = `/api/v1/public/events/?page=1`;

        if (query) url += `&search=${encodeURIComponent(query)}`;
        if (date) url += `&start_date=${date}`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                events = data.results || [];
                renderEvents(events);
                updatePagination(data.count, 1);
            });
    }

    function filterByType(type) {
        let url = `/api/v1/public/events/?page=1`;
        if (type) url += `&event_type=${type}`;
        fetch(url)
            .then(response => response.json())
            .then(data => {
                events = data.results || [];
                renderEvents(events);
                updatePagination(data.count, 1);
            });
    }

    function sortEvents(order) {
        let url = `/api/v1/public/events/?ordering=${order}`;
        fetch(url)
            .then(response => response.json())
            .then(data => {
                events = data.results || [];
                renderEvents(events);
            });
    }

    function clearFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('dateInput').value = '';
        loadEvents(1);
    }

    function showEmptyState() {
        document.getElementById('eventsGrid').innerHTML = `
            <div class="col-span-full text-center py-12">
                <i class="fas fa-exclamation-circle text-gray-300 text-6xl mb-4"></i>
                <p class="text-gray-500 text-lg">Unable to load events</p>
                <p class="text-gray-400">Please try again later</p>
            </div>
        `;
    }

    function getRandomGradient() {
        const gradients = [
            'from-indigo-400 to-purple-500',
            'from-blue-400 to-indigo-500',
            'from-green-400 to-teal-500',
            'from-orange-400 to-red-500',
            'from-pink-400 to-rose-500',
            'from-cyan-400 to-blue-500'
        ];
        return gradients[Math.floor(Math.random() * gradients.length)];
    }

    function formatDate(dateString) {
        if (!dateString) return 'Date TBD';
        const date = new Date(dateString);
        return date.toLocaleDateString('en-US', {
            weekday: 'short',
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    // Search on Enter key
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchEvents();
    });
</script>
{% endblock %}
