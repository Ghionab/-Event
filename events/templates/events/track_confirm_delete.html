{% extends 'events/base.html' %}

{% block title %}Delete Track{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div class="bg-red-500 px-6 py-4">
            <h1 class="text-xl font-bold text-white"><i class="bi bi-exclamation-triangle mr-2"></i>Delete Track</h1>
        </div>

        <div class="p-6">
            <p class="text-gray-700 text-lg mb-4">Are you sure you want to delete <strong class="text-gray-900">{{ track.name }}</strong>?</p>

            <div class="p-4 rounded-lg bg-yellow-50 border border-yellow-200 text-yellow-700 mb-6">
                <div class="flex items-start">
                    <i class="bi bi-exclamation-triangle mt-0.5 mr-2"></i>
                    <div>
                        <p class="font-medium">Warning</p>
                        <p class="text-sm mt-1">Sessions in this track will not be deleted, but they will lose their track assignment.</p>
                    </div>
                </div>
            </div>

            <form method="post" class="flex flex-col sm:flex-row gap-4 justify-end">
                <a href="{% url 'track_list' event.id %}" class="inline-flex items-center justify-center px-6 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition font-medium">
                    <i class="bi bi-x-lg mr-2"></i> Cancel
                </a>
                <button type="submit" class="inline-flex items-center justify-center px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition font-medium shadow-md">
                    <i class="bi bi-trash mr-2"></i> Yes, Delete Track
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
