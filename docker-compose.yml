version: '3.9'

services:
  # Main Django Application - Attendee Portal
  app-attendee:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventaxis_attendee
    ports:
      - "8001:8001"
    environment:
      - DEBUG=0
      - DOMAIN=Eventaxiss.com
      - PORT=8001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DJANGO_SETTINGS_MODULE=event_project.settings_production
      - DJANGO_DB_HOST=db
    volumes:
      - ./media:/app/media
      - ./static:/app/static
      - ./logs:/app/logs
    depends_on:
      - redis
      - db
    restart: unless-stopped
    networks:
      - eventaxis_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Organizer Portal
  app-organizer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventaxis_organizer
    ports:
      - "8002:8002"
    environment:
      - DEBUG=0
      - DOMAIN=organizer.Eventaxiss.com
      - PORT=8002
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DJANGO_SETTINGS_MODULE=event_project.settings_production
      - DJANGO_DB_HOST=db
    volumes:
      - ./media:/app/media
      - ./static:/app/static
      - ./logs:/app/logs
    depends_on:
      - redis
      - db
    restart: unless-stopped
    networks:
      - eventaxis_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Cache and Message Broker
  redis:
    image: redis:7-alpine
    container_name: eventaxis_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ./redis/data:/data
    restart: unless-stopped
    networks:
      - eventaxis_network

  # Celery Worker for Attendee Portal
  celery-attendee:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventaxis_celery_attendee
    command: celery -A event_project worker -l info --concurrency=4
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - DJANGO_SETTINGS_MODULE=event_project.settings_production
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      - redis
      - db
      - app-attendee
    restart: unless-stopped
    networks:
      - eventaxis_network

  # Celery Worker for Organizer Portal
  celery-organizer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventaxis_celery_organizer
    command: celery -A event_project worker -l info --concurrency=4 -Q organizer
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - DJANGO_SETTINGS_MODULE=event_project.settings_production
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      - redis
      - db
      - app-organizer
    restart: unless-stopped
    networks:
      - eventaxis_network

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventaxis_celery_beat
    command: celery -A event_project beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - DJANGO_SETTINGS_MODULE=event_project.settings_production
    volumes:
      - ./media:/app/media
    depends_on:
      - redis
      - db
    restart: unless-stopped
    networks:
      - eventaxis_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: eventaxis_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - ./static:/usr/share/nginx/html/static
      - ./media:/usr/share/nginx/html/media
    depends_on:
      - app-attendee
      - app-organizer
    restart: unless-stopped
    networks:
      - eventaxis_network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: eventaxis_db
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./db/data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - eventaxis_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  eventaxis_network:
    driver: bridge
