{% extends 'participant/base.html' %}

{% block title %}Password Reset - EventPortal{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-xl p-8 text-center">
            <i class="fas fa-lock text-indigo-600 text-4xl mb-4"></i>
            <h2 class="text-2xl font-bold mb-2">Reset Password</h2>
            <p class="text-gray-500 mb-6">Enter your email address and we'll send you a link to reset your password.</p>

            <form>
                <input type="email" placeholder="Enter your email" class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-4 focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">
                    Send Reset Link
                </button>
            </form>

            <div class="mt-6">
                <a href="/login/" class="text-indigo-600 hover:text-indigo-800 text-sm">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
