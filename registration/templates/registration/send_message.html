{% extends 'events/base.html' %}

{% block title %}Send Message to {{ recipient.email }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-12">
    <div class="ea-card">
        <div class="ea-card-header">
            <h4 class="text-xl font-heading font-bold">Send Message</h4>
        </div>
        <div class="p-6">
            <p class="text-gray-500 mb-4">To: {{ recipient.email }}</p>
            
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="ea-form-label">Subject</label>
                    <input type="text" name="subject" class="ea-input" placeholder="Message subject">
                </div>
                <div>
                    <label class="ea-form-label">Message</label>
                    <textarea name="message" class="ea-input" rows="5" placeholder="Write your message..."></textarea>
                </div>
                <div>
                    <label class="ea-form-label">Related Event (optional)</label>
                    <select name="event_id" class="ea-select">
                        <option value="">-- Select Event --</option>
                        {% for reg in user_registrations %}
                            <option value="{{ reg.event.id }}">{{ reg.event.title }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="flex justify-between pt-4">
                    <a href="{% url 'attendee_messages' %}" class="ea-btn ea-btn-secondary">Cancel</a>
                    <button type="submit" class="ea-btn ea-btn-primary">Send Message</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
