{% extends 'participant/base.html' %}

{% block title %}Registration Confirmed - EventAxis{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="bg-white rounded-2xl shadow-xl p-8 text-center">
        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="bi bi-check-lg text-green-600 text-4xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Registration Confirmed!</h1>
        <p class="text-gray-500 mb-6">Your registration has been confirmed. Check your email for details.</p>

        <div class="bg-gray-50 rounded-lg p-6 mb-6">
            <p class="text-sm text-gray-500 mb-2">Registration Number</p>
            <p class="text-2xl font-mono font-bold">REG-XXXXXXXX</p>
        </div>

        <a href="/my-registrations/" class="ea-btn ea-btn-primary ea-btn-lg">
            View My Registrations
        </a>
    </div>
</div>
{% endblock %}
